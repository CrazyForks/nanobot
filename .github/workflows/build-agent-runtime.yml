name: Build Agent Runtime Docker Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push agent runtime Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent runtime Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.agent-runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nanobot-agent-runtime:main
          labels: |
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.title=nanobot-agent-runtime
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=main
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Nanobot agent runtime dependencies
